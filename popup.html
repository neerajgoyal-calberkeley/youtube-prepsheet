<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Summarizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: #1A1A1A;
      background: #FAFAFA;
      width: 360px;
      min-height: 200px;
      max-height: 560px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #FFFFFF;
      border-bottom: 1px solid #F0F0F0;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 10px; }

    .brand-icon {
      width: 34px;
      height: 34px;
      background: #BF5700;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .brand-icon svg { width: 18px; height: 18px; color: white; }

    .brand-text h1 { font-size: 14px; font-weight: 700; color: #1A1A1A; }
    .brand-text p  { font-size: 11px; color: #999; margin-top: 1px; }

    .header-actions { display: flex; gap: 4px; }

    .icon-btn {
      background: #F5F5F5;
      border: none;
      color: #666;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .icon-btn:hover { background: #EBEBEB; color: #1A1A1A; }
    .icon-btn svg { width: 15px; height: 15px; }

    /* ── Auth bar ── */
    #auth-bar {
      background: #FFF5EC;
      border-bottom: 1px solid #FFE0CC;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      flex-shrink: 0;
    }

    .auth-info { color: #A24A00; font-weight: 600; font-size: 12px; }

    .auth-link {
      font-size: 12px;
      color: #BF5700;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }

    .auth-link:hover { text-decoration: underline; }

    /* ── Free bar ── */
    #free-bar {
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11.5px;
      border-bottom: 1px solid #F0F0F0;
      flex-shrink: 0;
      background: #FFFFFF;
    }

    #free-bar .free-label { color: #888; white-space: nowrap; }

    .progress-bar {
      flex: 1;
      height: 5px;
      background: #F0F0F0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #BF5700, #D46500);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* ── Section header ── */
    .section-bar {
      padding: 10px 16px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .section-bar h2 {
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .badge {
      background: #BF5700;
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
    }

    /* ── List ── */
    .cs-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 8px;
    }

    .cs-list::-webkit-scrollbar { width: 4px; }
    .cs-list::-webkit-scrollbar-thumb { background: #E0E0E0; border-radius: 4px; }

    .cs-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .cs-card:hover { background: #FFF5EC; }

    .cs-thumb {
      width: 76px;
      height: 48px;
      border-radius: 7px;
      object-fit: cover;
      flex-shrink: 0;
      background: #F5F5F5;
    }

    .cs-thumb-placeholder {
      width: 76px;
      height: 48px;
      border-radius: 7px;
      background: #FFF5EC;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #BF5700;
    }

    .cs-thumb-placeholder svg { width: 20px; height: 20px; }

    .cs-info { flex: 1; min-width: 0; }

    .cs-title {
      font-size: 12.5px;
      font-weight: 600;
      color: #1A1A1A;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .cs-channel {
      font-size: 11.5px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .cs-date { font-size: 11px; color: #BBB; }

    .cs-delete {
      background: none;
      border: none;
      color: #DDD;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
    }

    .cs-delete:hover { color: #EF4444; background: #FFF5F5; }
    .cs-delete svg { width: 14px; height: 14px; }

    /* ── Empty state ── */
    .empty-state { padding: 16px; }

    .step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #FFF5EC;
      color: #BF5700;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text strong { display: block; font-size: 12.5px; color: #1A1A1A; margin-bottom: 2px; }
    .step-text span   { color: #888; font-size: 12px; line-height: 1.45; }

    /* ── Footer ── */
    .footer {
      padding: 10px 14px;
      border-top: 1px solid #F0F0F0;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: #FFFFFF;
    }

    .btn-primary {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px;
      background: #BF5700;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover { background: #A24A00; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

    /* ── Error / retry bar ── */
    #error-bar {
      padding: 10px 14px;
      background: #FFF5EC;
      border-top: 1px solid #FFE0CC;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }

    #error-bar p { font-size: 12px; color: #A24A00; line-height: 1.4; }

    #btn-refresh-tab {
      background: #BF5700;
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #btn-refresh-tab:hover { background: #A24A00; }
    .btn-primary svg { width: 14px; height: 14px; }

    .btn-secondary {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px;
      background: #F5F5F5;
      color: #555;
      border: 1px solid #E5E5E5;
      border-radius: 8px;
      font-size: 12.5px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: #EBEBEB; }
    .btn-secondary svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round">
          <line x1="10" y1="1" x2="10" y2="2.8"/>
          <line x1="14.2" y1="2.3" x2="13.2" y2="3.3"/>
          <line x1="16.5" y1="6.5" x2="14.9" y2="7"/>
          <line x1="5.8" y1="2.3" x2="6.8" y2="3.3"/>
          <line x1="3.5" y1="6.5" x2="5.1" y2="7"/>
          <path d="M7.5 14C6.6 12.8 6 11.3 6 9.5a4 4 0 0 1 8 0c0 1.8-.6 3.3-1.5 4.5"/>
          <line x1="7.5" y1="14" x2="12.5" y2="14"/>
          <line x1="8" y1="15.5" x2="12" y2="15.5"/>
          <line x1="8.5" y1="17" x2="11.5" y2="17"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>YouTube Summarizer</h1>
        <p>AI-powered study notes</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-profile" title="My Account">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <button class="icon-btn" id="btn-settings" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="auth-bar" style="display:none">
    <span class="auth-info" id="auth-email"></span>
    <button class="auth-link" id="btn-auth-profile">My Account</button>
  </div>

  <div id="free-bar">
    <span class="free-label" id="free-label">0 / 3 free</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <button class="auth-link" id="btn-upgrade-small">Upgrade</button>
  </div>

  <div class="section-bar">
    <h2>My Cheatsheets</h2>
    <span class="badge" id="cs-count">0</span>
  </div>

  <div class="cs-list" id="cs-list"></div>

  <div id="error-bar">
    <p>Page still loading — refresh it first.</p>
    <button id="btn-refresh-tab">↺ Refresh Tab</button>
  </div>

  <div class="footer">
    <button class="btn-primary" id="btn-create" disabled title="Open a YouTube video to use this feature">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" stroke-linejoin="round">
        <line x1="10" y1="1" x2="10" y2="2.8"/>
        <line x1="14.2" y1="2.3" x2="13.2" y2="3.3"/>
        <line x1="16.5" y1="6.5" x2="14.9" y2="7"/>
        <line x1="5.8" y1="2.3" x2="6.8" y2="3.3"/>
        <line x1="3.5" y1="6.5" x2="5.1" y2="7"/>
        <path d="M7.5 14C6.6 12.8 6 11.3 6 9.5a4 4 0 0 1 8 0c0 1.8-.6 3.3-1.5 4.5"/>
        <line x1="7.5" y1="14" x2="12.5" y2="14"/>
        <line x1="8" y1="15.5" x2="12" y2="15.5"/>
        <line x1="8.5" y1="17" x2="11.5" y2="17"/>
      </svg>
      Create Cheatsheet
    </button>
    <button class="btn-secondary" id="btn-upgrade" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      Upgrade
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
