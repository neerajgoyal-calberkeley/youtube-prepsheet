<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — YouTube Summarizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #FFF5EC 0%, #FFE8CC 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1A1A1A;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(191, 87, 0, 0.15);
      max-width: 400px;
      width: 100%;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #7A3900, #BF5700);
      padding: 28px 28px 24px;
      text-align: center;
      color: white;
    }

    .card-header .logo {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.15);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    .card-header .logo svg { width: 24px; height: 24px; }
    .card-header h1 { font-size: 20px; font-weight: 700; }
    .card-header p { font-size: 13px; opacity: 0.8; margin-top: 4px; }

    .tabs {
      display: flex;
      border-bottom: 1px solid #F0D5B0;
    }

    .tab {
      flex: 1;
      padding: 13px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #999;
      border: none;
      background: none;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: #BF5700;
      border-bottom-color: #BF5700;
    }

    .card-body { padding: 24px 28px 28px; }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1A1A1A;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #BF5700;
      box-shadow: 0 0 0 3px rgba(191, 87, 0, 0.1);
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #8A3E00, #BF5700);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-google {
      width: 100%;
      padding: 11px;
      background: #fff;
      color: #333;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-google:hover { background: #f9fafb; border-color: #d1d5db; }

    .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: #aaa;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: none;
    }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .note {
      font-size: 11.5px;
      color: #aaa;
      text-align: center;
      margin-top: 14px;
      line-height: 1.5;
    }

    .note a { color: #BF5700; text-decoration: none; }
    .note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <h1>YouTube Summarizer</h1>
      <p>Sign in to access unlimited cheatsheets</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-signin">Sign In</button>
      <button class="tab" id="tab-signup">Create Account</button>
    </div>

    <div class="card-body">
      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>

      <div id="error-config" class="error-msg" style="display:block">
        Firebase not configured. Fill in <strong>firebase-config.js</strong> with your project details.
      </div>

      <div id="form-area">
        <div class="form-group">
          <label for="input-email">Email address</label>
          <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="input-password">Password</label>
          <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password" minlength="6">
        </div>

        <button class="btn-primary" id="btn-submit">
          <span id="btn-label">Sign In</span>
        </button>

        <div class="divider">or</div>

        <button class="btn-google" id="btn-google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>
      </div>

      <p class="note">
        By signing in you agree to our terms of service.<br>
        Your data is stored securely and never sold.
      </p>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
