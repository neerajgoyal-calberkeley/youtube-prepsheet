<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Cheatsheet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #F8F4EF;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .viewer-header {
      background: linear-gradient(135deg, #7A3900, #BF5700);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(191, 87, 0, 0.3);
    }

    .viewer-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .viewer-header-left svg { width: 22px; height: 22px; flex-shrink: 0; }

    .viewer-meta { min-width: 0; }
    .viewer-meta h1 {
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 600px;
    }
    .viewer-meta p {
      font-size: 12px;
      opacity: 0.75;
      margin-top: 2px;
    }

    .viewer-header-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .header-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .header-btn:hover { background: rgba(255,255,255,0.25); }
    .header-btn svg { width: 15px; height: 15px; }

    /* ── Content ── */
    .viewer-content {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px 140px;
    }

    /* ── Action Bar ── */
    .action-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #F0D5B0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 4px;
      justify-content: center;
      z-index: 100;
    }

    .action-btn {
      position: relative;
      background: #FFF5EC;
      border: 1.5px solid #F0D5B0;
      border-radius: 10px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #A24A00;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
    }

    .action-btn:hover { transform: translateY(-2px); }
    .action-btn svg { width: 20px; height: 20px; }

    .action-btn.edit:hover    { background: #f0ebff; color: #BF5700; border-color: #BF5700; }
    .action-btn.pdf:hover     { background: #fff5f5; color: #dc2626; border-color: #fca5a5; }
    .action-btn.word:hover    { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }
    .action-btn.email:hover   { background: #fff7ed; color: #ea580c; border-color: #fdba74; }
    .action-btn.whatsapp:hover{ background: #f0fdf4; color: #16a34a; border-color: #86efac; }
    .action-btn.discord:hover { background: #eef2ff; color: #5865F2; border-color: #a5b4fc; }
    .action-btn.slack:hover   { background: #fdf4ff; color: #BF5700; border-color: #d8b4fe; }
    .action-btn.sms:hover     { background: #eff6ff; color: #2563eb; border-color: #93c5fd; }

    /* Tooltip */
    .action-btn::before {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A;
      color: white;
      font-size: 11.5px;
      font-weight: 500;
      padding: 5px 9px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .action-btn:hover::before { opacity: 1; }

    .action-divider {
      width: 1px;
      height: 36px;
      background: #F0D5B0;
      margin: 0 6px;
      flex-shrink: 0;
    }

    .edit-controls {
      display: none;
      align-items: center;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .btn-save-edit {
      padding: 10px 20px;
      background: linear-gradient(135deg, #8A3E00, #BF5700);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
    }

    .btn-cancel-edit {
      padding: 10px 20px;
      background: #FFF5EC;
      color: #A24A00;
      border: 1.5px solid #F0D5B0;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    /* Edit mode styles */
    .viewer-content[contenteditable="true"] {
      outline: 2px solid #BF5700;
      outline-offset: 8px;
      border-radius: 4px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1A1A1A;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Cheatsheet content defaults */
    .viewer-content h2, .viewer-content h3, .viewer-content h4 { color: #7A3900; margin: 18px 0 8px; }
    .viewer-content h2 { font-size: 18px; }
    .viewer-content h3 { font-size: 15px; }
    .viewer-content p { margin-bottom: 10px; line-height: 1.65; }
    .viewer-content ul, .viewer-content ol { padding-left: 22px; margin-bottom: 12px; }
    .viewer-content li { margin-bottom: 5px; line-height: 1.6; }
    .viewer-content hr { border: none; border-top: 1px solid #F0D5B0; margin: 18px 0; }
    .viewer-content code, .viewer-content pre { font-family: monospace; font-size: 13px; background: #FFF5EC; border-radius: 4px; padding: 2px 6px; }
    .viewer-content strong { color: #7A3900; font-weight: 600; }

    #loading {
      text-align: center;
      padding: 80px 24px;
      color: #666;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #F0D5B0;
      border-top-color: #BF5700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media print {
      .viewer-header, .action-bar, #toast { display: none !important; }
      .viewer-content { padding: 0; max-width: none; }
      body { background: white; }
    }
  </style>
</head>
<body>
  <div class="viewer-header">
    <div class="viewer-header-left">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <div class="viewer-meta">
        <h1 id="viewer-title">Study Cheatsheet</h1>
        <p id="viewer-meta"></p>
      </div>
    </div>
    <div class="viewer-header-actions">
      <button class="header-btn" id="btn-close">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Close
      </button>
    </div>
  </div>

  <div class="viewer-content" id="viewer-content">
    <div id="loading">
      <div class="spinner"></div>
      <p>Loading cheatsheet…</p>
    </div>
  </div>

  <div class="action-bar" id="action-bar" style="display:none">
    <div class="action-icons" id="action-icons" style="display:flex;align-items:center;gap:4px;">
      <button class="action-btn edit" data-action="edit" data-tooltip="Edit notes">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="action-btn pdf" data-action="pdf" data-tooltip="Save as PDF">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
      </button>
      <button class="action-btn word" data-action="word" data-tooltip="Save as Word doc">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><polyline points="8 13 10 19 12 13 14 19 16 13"/></svg>
      </button>

      <div class="action-divider"></div>

      <button class="action-btn email" data-action="email" data-tooltip="Send via Email">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </button>
      <button class="action-btn whatsapp" data-action="whatsapp" data-tooltip="Share on WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </button>
      <button class="action-btn discord" data-action="discord" data-tooltip="Copy for Discord">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><circle cx="9" cy="10" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="10" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="10" r="1" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="action-btn slack" data-action="slack" data-tooltip="Copy for Slack">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/><path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/><path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/><path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/><path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/><path d="M15.5 19H14v1.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z"/><path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/><path d="M8.5 5H10V3.5C10 2.67 9.33 2 8.5 2S7 2.67 7 3.5 7.67 5 8.5 5z"/></svg>
      </button>
      <button class="action-btn sms" data-action="sms" data-tooltip="Send via SMS">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
      </button>
    </div>

    <div class="edit-controls" id="edit-controls">
      <button class="btn-save-edit" id="btn-save-edit">Save Edits</button>
      <button class="btn-cancel-edit" id="btn-cancel-edit">Cancel</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="viewer.js"></script>
</body>
</html>
